# S3: same as S0, but disable bottleneck self-attention.
variant: v4_s3_no_attn
use_cno: true
cno_mode: residual
fm_condition: [mu]
fm_in_channels: 10

fm:
  coupling: minibatch_ot
  t_sampling: uniform
  t_eps: 1.0e-5
  attn_heads: 0

training:
  fm:
    lr: 1.0e-4
    weight_decay: 1.0e-5
    batch_size: 8
    accumulate_grad_batches: 4
    max_epochs: 100
    warmup_epochs: 5
    precision: bf16-mixed

loss:
  var_weights: [1.5, 1.0, 1.0, 2.0, 2.0]
