# v7a: CNO residual Flow Matching with lightweight Swin U-Net and geo conditioning.

variant: v7a_swin_geo_edm_light

use_cno: true
cno_mode: residual
fm_target: residual_mu
fm_condition: [mu, mask, dist_coast, lat, lon_sin, lon_cos, region_id]
fm_in_channels: 22

data:
  patch_size: 512
  patch_sampling:
    enabled: true
    mode: weighted
    num_candidates: 32
    weights:
      open_ocean: 1.0
      coastal: 2.5
      mediterranean: 6.0
      black_sea: 10.0
      arctic_ice: 5.0
      arctic_open: 4.0
      antarctic: 3.0

fm:
  arch: swin_unet
  x_channels: 5
  out_channels: 5
  time_dim: 256
  num_inference_steps: 25
  coupling: independent
  t_sampling: logit_normal
  t_eps: 1.0e-5
  cond_dropout_p: 0.10
  cond_dropout_groups: [dynamic]

condition:
  dynamic_channels: 5
  static_channels: 12
  condition_channels: 17
  region_channels: 7

model:
  patch_size: 4
  embed_dim: 96
  depths: [2, 2, 4, 2]
  heads: [3, 6, 12, 6]
  window_size: 8
  qk_norm: true
  norm: rmsnorm
  residual_scale: sqrt2
  output_zero_init: true
  geo_film: true
  cross_attn_bottleneck: true
  freq_gate: false

training:
  fm:
    lr: 1.0e-4
    weight_decay: 1.0e-5
    batch_size: 2
    accumulate_grad_batches: 8
    max_epochs: 150
    warmup_epochs: 5
    precision: bf16-mixed
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm

loss:
  var_weights: [1.5, 0.3, 1.0, 1.5, 1.5]
  recoarsen:
    enabled: true
    weight: 0.02
    factor: 3
    target: lr_batch
    warmup_epochs: 10
    min_ocean_fraction: 0.5
  spectral:
    enabled: false
  gradient:
    enabled: false
  geostrophic:
    enabled: false

logging:
  monitor: val/loss
  save_top_k: 3
