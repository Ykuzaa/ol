# V2 fine-tuning: same architecture as V2, plus a log-gradient loss on thetao.
variant: v2_loggrad
use_cno: true
cno_mode: residual
fm_condition: [mu]
fm_in_channels: 10

training:
  cno:
    lr: 5.0e-5
    weight_decay: 1.0e-5
    batch_size: 8
    accumulate_grad_batches: 4
    max_epochs: 25
    warmup_epochs: 2
    precision: bf16-mixed

loss:
  var_weights: [1.5, 1.0, 1.0, 2.0, 2.0]
  log_gradient:
    enabled: true
    variables: [thetao]
    weight: 0.05
    eps: 1.0e-6
